DEVICE: 'cuda:0'
NUM_WORKERS: 8
SEED_NUM: 2

DATASET:
  name: 'DSECEvent'
  path: '/media/adeel/hdd2/event_data/desc/' # Replace with your own path
  require_paired_data: True
  classes: 11
  event_representation: 'voxel_grid'
  fixed_duration: False  # If True, use fixed duration for event data
  delta_t: 50
  nr_events: 100000
  nr_bins: 10
  img_chnls: 3
  data_type: 'fusion'
  img_size: [440, 640]

MODEL:
  name: 'MambaSeg-8'
  version_img: 'groupmamba_small'
  version_ev: 'groupmamba_small'
  pretrained_img: './groupmamba_small_ema.pth'
  pretrained_ev: './groupmamba_small_ema.pth'
  event_rep: 'None'
  fuse: 'MWCMF'

TRAIN:
  # lr_scheduler: 'polynomial'
  lr_scheduler: 'fixed'
  warmup_iters: 500
  batch_size: 2
  accum_steps: 4
  amp: true
  lr_init: 0.000014
  num_epochs: 80
  save_every_n_epochs: 20
  log_dir: 'log/DSEC/test'
  resume_checkpoint: /media/adeel/hdd2/WaveMamba/log/DSEC/test/best_model.pth

EVAL:
  batch_size: 8
  weight_path: '/media/adeel/hdd2/WaveMamba/log/DSEC/test/best_model.pth'